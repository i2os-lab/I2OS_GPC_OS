  <line x1="490" y1="949" x2="490" y2="994" class="arrow"/>

  <rect x="240" y="994" width="500" height="62" class="box"/>
  <text x="490" y="1020" text-anchor="middle" class="text">Memory Module</text>
  <text x="490" y="1045" text-anchor="middle" class="small">Decision / Exet / Close / Snapshot Logs</text>

  <path d="M740 1024 C910 1024 910 273 740 273" class="arrow dashed"/>
